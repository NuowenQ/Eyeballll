    z: -1.3
    yaw: 180.0
  - name: slalom_pole_1
    x: 7.8
    y: 3.2
    z: -1.3
    yaw: 180.0
  - name: slalom_pole_0
    x: 10.0
    y: 3.80
    z: -1.3
    yaw: 180.0
  - name: slalom_start # assume right side.
    x: 13.0
    y: 3.80
    yaw: 180.0
  - name: bin
    x: 14.6
    y: 5.6
    yaw: 0.0
  - name: bin_end
    x: 14.6
    y: 5.6
    yaw: 0.0
