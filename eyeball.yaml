# rs26 eyeball map — authored in the world ENU frame (anchored at vehicle init):
#   +x  = East  = vehicle-forward-at-init
#   +y  = North = vehicle-left-at-init
#   +z  = Up    (depths are negative; usually overridden by goto_depth anyway)
#   yaw = degrees, anticlockwise from +x/East (0 = facing forward-at-init)
#
# Legs are executed RELATIVELY (end - start), re-referenced to zero_yaw before
# each leg; authored yaws only matter as diffs against the leg's start waypoint.
#
# ALL VALUES ARE PLACEHOLDERS carried over from rs24 — re-eyeball at the venue.

# B2 (updated for 1630 slot)
map:
  - name: start
    x: 0.0
    y: 0.0
    yaw: 0.0
  - name: gate_start
    x: -0.5
    y: 0.0
    z: -1.0
    yaw: 0.0
  - name: gate # not used.
    x: 2.8
    y: -2.1
  - name: gate_end
    x: 4.3
    y: -2.1
    yaw: 0.0
  - name: gate_back # used for return home
    x: 5.6
    y: -2.1
    z: -1.0
    yaw: 180.0
  - name: slalom_end # quite yawed 10 degrees slalom poles
    x: 3.7
    y: 0.7
    z: -1.3
    yaw: 180
  - name: slalom_pole_2
    x: 5.2
    y: 0.7
    z: -1.3
    yaw: 180
  - name: slalom_pole_1
    x: 7.2
    y: 1.3
    z: -1.3
    yaw: 180
  - name: slalom_pole_0
    x: 9.2
    y: 0.5
    z: -1.3
    yaw: 180
  - name: slalom_start # assume right side.
    x: 12.0
    y: 1.0
    yaw: 180
  - name: bin
    x: 13.5
    y: 4.0
    yaw: 0.0
  - name: bin_end
    x: 13.5
    y: 4.0
    yaw: 0.0